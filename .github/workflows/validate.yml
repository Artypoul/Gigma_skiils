name: Validate plugin catalogue

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate plugins and Codex mirror
        run: python validate_plugin.py

      - name: Run Codex Toolkit review regression tests
        run: python -m unittest discover -s plugins/codex-toolkit/tests -p "test_*.py"

  first-pass-quality-contract:
    strategy:
      fail-fast: false
      matrix:
        os:
          - windows-latest
          - ubuntu-latest
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run first-pass quality contract suite
        shell: pwsh
        run: ./plugins/first-pass-quality/tests/run-contract-tests.ps1

      - name: Smoke-test Codex and Claude hook commands
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./plugins/first-pass-quality/tests/run-hook-config-smoke.ps1
